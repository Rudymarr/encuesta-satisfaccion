<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrador de Encuestas - BEMISAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SheetJS (Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h2, h3 {
      margin-top: 25px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    input[type="text"] {
      width: 160px;
      padding: 5px;
      font-size: 13px;
    }

    .acciones {
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f0f0f0;
    }

    img {
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .btn-guardar {
      background: #2d7ef7;
      color: white;
      border: none;
      border-radius: 4px;
    }

    .btn-guardar:hover {
      background: #1e5fc4;
    }
  </style>
</head>

<body>

  <!-- ================= ENCABEZADO ================= -->
  <h2>📋 Panel Administrador – Encuestas BEMISAL</h2>

  <!-- ================= ACCIONES ================= -->
  <div class="acciones">
    <button id="exportarExcel">📊 Exportar a Excel</button>
    <button id="exportarPDF">📄 Exportar a PDF</button>
  </div>

  <!-- ================= TABLA DE ENCUESTAS ================= -->
  <h3>📄 Encuestas Registradas</h3>

  <table>
    <thead>
      <tr>
        <th>Razón Social</th>
        <th>Fecha</th>
        <th>Hora</th>

   

        <th>Comunicación</th>
        <th>Atención</th>
        <th>Condiciones</th>
        <th>Amabilidad</th>

        <th>Observaciones</th>
        <th>Firma</th>
        <th>Fotos</th>
         <!-- TRAZABILIDAD (EDITABLE EN ADMIN) -->
        <th>Transportista</th>
        <th>Especialista Logística</th>
        <th>Acción</th>
      </tr>
    </thead>

    <tbody id="tablaEncuestas">
      <!-- JS carga dinámicamente -->
    </tbody>
  </table>

  <!-- ================= SCRIPT ================= -->
  <!-- IMPORTANTE: se carga como módulo -->
  <script type="module" src="admin.js"></script>

</body>
</html>
