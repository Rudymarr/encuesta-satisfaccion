<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrador de Encuestas - BEMISAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SheetJS (Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h2, h3, h4 {
      margin-top: 30px;
    }

    .acciones {
      margin-bottom: 15px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
      margin-left: 6px;
    }

    input {
      padding: 6px;
      margin-right: 6px;
    }

    hr {
      margin: 30px 0;
    }

    /* Tablas */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #eee;
    }

    /* Catálogos */
    .catalogo-item {
      margin: 6px 0;
    }

    .catalogo-item span {
      margin-right: 10px;
    }

    .inactivo {
      text-decoration: line-through;
      color: #888;
    }

    /* Imágenes */
    img {
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <!-- ================= ENCABEZADO ================= -->
  <h2>📋 Panel Administrador – Encuestas BEMISAL</h2>

  <!-- ================= ACCIONES ================= -->
  <div class="acciones">
    <button id="exportarExcel">📊 Exportar a Excel</button>
    <button id="exportarPDF">📄 Exportar a PDF</button>
  </div>

  <!-- ================= CATÁLOGOS ================= -->
  <hr>

  <h3>⚙️ Catálogos de Trazabilidad</h3>

  <!-- TRANSPORTISTAS -->
  <div class="acciones">
    <h4>🚚 Transportistas</h4>
    <input type="text" id="nuevoTransportista" placeholder="Nombre del transportista">
    <button id="btnAddTransportista">Agregar</button>
    <div id="listaTransportistas"></div>
  </div>

  <!-- ESPECIALISTAS -->
  <div class="acciones">
    <h4>👤 Especialistas de Logística</h4>
    <input type="text" id="nuevoEspecialista" placeholder="Nombre del especialista">
    <button id="btnAddEspecialista">Agregar</button>
    <div id="listaEspecialistas"></div>
  </div>

  <!-- ================= TABLA ENCUESTAS ================= -->
  <hr>

  <h3>📄 Encuestas Registradas</h3>

  <table>
    <thead>
      <tr>
        <th>Razón Social</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Comunicación</th>
        <th>Atención</th>
        <th>Condiciones</th>
        <th>Amabilidad</th>
        <th>Observaciones</th>
        <th>Firma</th>
        <th>Fotos</th>
      </tr>
    </thead>
    <tbody id="tablaEncuestas"></tbody>
  </table>

  <!-- ================= SCRIPT ================= -->
  <script type="module" src="admin.js"></script>

</body>
</html>
